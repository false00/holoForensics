name: Notify Homepage on Wiki Change

on:
  push:
    branches:
      - main
    paths:
      - 'holoForensics.wiki/**'
      - 'README.md'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger holoForensics-homepage rebuild
        env:
          HOMEPAGE_DISPATCH_TOKEN: ${{ secrets.HOMEPAGE_DISPATCH_TOKEN }}
          SOURCE_REF: ${{ github.ref }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          if [ -z "${HOMEPAGE_DISPATCH_TOKEN}" ]; then
            echo "::error::HOMEPAGE_DISPATCH_TOKEN is not configured."
            exit 1
          fi

          payload=$(
            cat <<EOF
          {"event_type":"wiki-updated","client_payload":{"sha":"${SOURCE_SHA}","ref":"${SOURCE_REF}"}}
          EOF
          )

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${HOMEPAGE_DISPATCH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "${payload}" \
            "https://api.github.com/repos/false00/holoForensics-homepage/dispatches"

          echo "Dispatched wiki-updated to holoForensics-homepage."
