services:
  holo-search:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.13.2
    container_name: holo-search
    environment:
      discovery.type: single-node
      cluster.name: holo-search-cluster
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  holo-kibana:
    image: docker.elastic.co/kibana/kibana:7.13.2
    container_name: holo-kibana
    depends_on:
      holo-search:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://holo-search:9200
      XPACK_SECURITY_ENABLED: "false"
      TELEMETRY_ENABLED: "false"
    ports:
      - "5601:5601"